<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 8.3;
        let c = parseFloat('3.2');

        let addition = a + c;
        let subtraction = a - c;
        let multiplication = a * c;
        let division = a / c;
        let modulus = a % c;

        document.write(addition);
        document.write('<br>');
        document.write(subtraction.toFixed(1));
        document.write('<br>');
        document.write(multiplication.toFixed(2));
        document.write('<br>');
        document.write(division.toFixed(5));
        document.write('<br>');
        document.write(modulus.toFixed(0));
    </script>
</body>
</html>
