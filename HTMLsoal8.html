<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nama = prompt('Masukkan nama : ');
        if (nama === 'Eji') {
            document.write(`Apa kabar ${nama}? Wish you luck!`);
        } else {
            document.write('Nama salah');
        }
    </script>
</body>
</html>
